name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python -m pip install -r requirements.txt
      - run: python -m py_compile divecha/scripts/validate_contract.py divecha/scripts/run_codex_loop.py
      - run: python divecha/scripts/validate_contract.py --mode author tests/fixtures/author.spec.md
      - run: python divecha/scripts/validate_contract.py --mode build tests/fixtures/build.spec.md
      - run: python divecha/scripts/run_codex_loop.py tests/fixtures/build.spec.md --cwd "$PWD" --once --no-ledger
